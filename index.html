<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ຈຳລອງພິທີມອບໃບປະກາດ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans Lao', sans-serif; background-color: #F1F5F9; color: #1E293B; }
        
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(10, minmax(0, 1fr));
            gap: 0.35rem;
        }
        
        .seat {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer; /* ປ່ຽນເປັນ pointer ເພື່ອໃຫ້ຮູ້ວ່າກົດເບິ່ງຊື່ໄດ້ */
        }

        .seat-pending { background-color: #E2E8F0; color: #64748B; }
        .seat-standby { background-color: #FBBF24; color: #78350F; animation: pulse 2s infinite; }
        .seat-completed { background-color: #10B981; color: #FFFFFF; }
        .seat-active { background-color: #3B82F6; color: #FFFFFF; transform: scale(1.15); z-index: 10; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* ລະບົບເອນິເມຊັ້ນຄົນຍ່າງ */
        @keyframes walkAcross {
            0% { left: 10%; bottom: -10px; opacity: 0; transform: translateX(-50%) scale(0.8); }
            15% { left: 15%; bottom: 30px; opacity: 1; transform: translateX(-50%) scale(1); }
            40% { left: 50%; bottom: 30px; opacity: 1; transform: translateX(-50%) scale(1.1); }
            60% { left: 50%; bottom: 30px; opacity: 1; transform: translateX(-50%) scale(1.1); }
            85% { left: 85%; bottom: 30px; opacity: 1; transform: translateX(-50%) scale(1); }
            100% { left: 90%; bottom: -10px; opacity: 0; transform: translateX(-50%) scale(0.8); }
        }

        .animate-walk {
            animation: walkAcross 3s ease-in-out forwards;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ເພີ່ມ CSS ສຳລັບການຈຳລອງເຕັມຈໍ (Pseudo-fullscreen) */
        .pseudo-fullscreen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            max-width: none !important;
            max-height: none !important;
            z-index: 9999 !important;
            border-radius: 0 !important;
            margin: 0 !important;
            overflow-y: auto !important;
            background-color: #ffffff !important;
            padding: 2rem !important;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 lg:p-8 custom-scrollbar">

    <main class="w-full max-w-4xl mx-auto">
        
        <!-- ໃສ່ ID simulator-card ທີ່ນີ້ ເພື່ອຄວບຄຸມການເຕັມຈໍ -->
        <div id="simulator-card" class="bg-white rounded-2xl shadow-xl p-6 lg:p-10 border border-slate-200 relative">
            
            <!-- ປຸ່ມເຕັມຈໍ -->
            <button id="fullscreen-btn" class="absolute top-4 right-4 text-slate-600 hover:text-slate-900 bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded text-sm font-bold transition flex items-center space-x-1 z-50 border border-slate-200 shadow-sm" title="ເບິ່ງແບບເຕັມຈໍ">
                <span id="fullscreen-icon">⛶</span> <span id="fullscreen-text" class="hidden sm:inline">ເຕັມຈໍ</span>
            </button>

            <!-- ສ່ວນຂອງເວທີ -->
            <div class="bg-slate-50 p-6 rounded-xl border border-slate-200 mb-8 relative overflow-hidden mt-8 sm:mt-0">
                
                <div class="flex justify-between items-center mb-8 relative z-10 min-h-[140px]">
                    
                    <!-- Track ສຳລັບເອນິເມຊັ້ນ -->
                    <div id="animation-track" class="absolute inset-0 pointer-events-none z-50"></div>

                    <div class="flex flex-col items-center justify-center bg-white p-3 rounded shadow-sm w-24 sm:w-32 border border-slate-200 relative z-10">
                        <span class="text-2xl mb-1">⬆️ 🚶‍♂️</span>
                        <span class="text-[10px] sm:text-xs font-bold text-slate-500 text-center">ຂັ້ນໄດຊ້າຍ<br>(ທາງຂຶ້ນ)</span>
                    </div>
                    
                    <div class="flex-1 flex flex-col items-center justify-center px-4 relative z-10">
                        <div class="w-full max-w-sm bg-blue-900 text-white text-center py-4 sm:py-5 rounded-lg shadow-inner font-bold text-lg tracking-widest relative">
                            ເວທີ (STAGE)
                            <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-amber-500 text-white text-xs px-4 py-1 rounded-full shadow-sm">
                                ປະທານມອບ
                            </div>
                        </div>
                        <div id="current-person-display" class="mt-4 text-center">
                            <span class="inline-block bg-blue-100 text-blue-800 px-4 py-2 rounded-full font-bold text-lg shadow-sm border border-blue-200">
                                ລໍຖ້າເລີ່ມພິທີ...
                            </span>
                        </div>
                    </div>

                    <div class="flex flex-col items-center justify-center bg-white p-3 rounded shadow-sm w-24 sm:w-32 border border-slate-200 relative z-10">
                        <span class="text-2xl mb-1">🚶‍♂️ ⬇️</span>
                        <span class="text-[10px] sm:text-xs font-bold text-slate-500 text-center">ຂັ້ນໄດຂວາ<br>(ທາງລົງ)</span>
                    </div>
                </div>

                <div class="mt-12 relative z-10">
                    <h4 class="text-sm font-bold text-slate-700 mb-4 flex flex-col sm:flex-row justify-between sm:items-end gap-2">
                        <span class="text-base text-center sm:text-left">ແຜນຜັງບ່ອນນັ່ງ (ລຳດັບ 2-61)</span>
                        <div class="flex justify-center space-x-4 text-[11px] font-normal">
                            <span class="flex items-center"><span class="w-3 h-3 bg-[#E2E8F0] inline-block mr-1.5 rounded"></span> ຍັງບໍ່ຮອດຄິວ</span>
                            <span class="flex items-center"><span class="w-3 h-3 bg-[#FBBF24] inline-block mr-1.5 rounded"></span> Standby</span>
                            <span class="flex items-center"><span class="w-3 h-3 bg-[#10B981] inline-block mr-1.5 rounded"></span> ສຳເລັດ</span>
                        </div>
                    </h4>
                    
                    <div id="seating-area" class="bg-white p-5 rounded-xl shadow-inner border border-slate-200 flex flex-col space-y-2 overflow-x-auto custom-scrollbar">
                    </div>
                </div>
            </div>

            <!-- ສ່ວນຂອງປຸ່ມກົດ -->
            <div class="flex flex-col sm:flex-row justify-center items-center space-y-4 sm:space-y-0 sm:space-x-4 pt-2">
                <button id="btn-next" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-10 rounded-full shadow-lg transform transition hover:-translate-y-0.5 active:scale-95 flex items-center text-lg w-full sm:w-auto justify-center">
                    <span>▶️ ເລີ່ມຕົ້ນ / ຄົນຕໍ່ໄປ</span>
                </button>
                <button id="btn-reset" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3.5 px-10 rounded-full shadow transition hover:-translate-y-0.5 active:scale-95 w-full sm:w-auto justify-center text-lg">
                    ຣີເຊັດ (Reset)
                </button>
            </div>

            <!-- ສ່ວນອັບໂຫຼດລາຍຊື່ CSV -->
            <div class="mt-8 pt-6 border-t border-slate-100 flex flex-col items-center">
                <label for="csv-upload" class="cursor-pointer inline-flex items-center space-x-2 text-sm font-semibold text-slate-500 hover:text-blue-600 transition bg-slate-50 py-2 px-4 rounded-lg border border-slate-200 hover:bg-blue-50 hover:border-blue-200">
                    <span class="text-lg">📁</span>
                    <span>ອັບໂຫຼດໄຟລ໌ລາຍຊື່ (CSV) ຂອງທ່ານເອງ</span>
                </label>
                <input type="file" id="csv-upload" accept=".csv" class="hidden">
                <span id="upload-status" class="text-xs text-emerald-600 mt-2 font-bold hidden">✅ ໂຫຼດລາຍຊື່ສຳເລັດແລ້ວ!</span>
            </div>

        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- ຖານຂໍ້ມູນລາຍຊື່ (Pre-loaded ຈາກ Snippet) ---
            let participantsData = {
                2: { org: "JSI", name: "ທ່ານ ພຸດທະສອນ ພິມມະໄກສອນ" },
                3: { org: "JSI", name: "ທ່ານ ແສງເດືອນ ບຸດດາວົງ" },
                4: { org: "JSI", name: "ທ່ານ ນາງ ລັດຕະນາ ພົມມະວົງສາ" },
                5: { org: "JSI", name: "ທ່ານ ຖາວອນ ໄຊຍະບຸດ" },
                6: { org: "JSI", name: "ທ່ານ ເກີດ ຊຸມພົນພັກດີ" },
                7: { org: "JSI", name: "ທ່ານ ຄຳຮູ້ ນັນທະລາດ" },
                8: { org: "JSI", name: "ທ່ານ ນາງ ທິບພາພອນ ໄຊມູນວົງ" },
                9: { org: "JSI", name: "ທ່ານ ທະລາລິນ ວົງສອນເພັດ" },
                10: { org: "MOH", name: "ທ່ານ ນາງ ກອງມະນີ ສຸພະມີໄຊ" },
                11: { org: "MOH", name: "ທ່່ານ ສົມສະແຫວງ ພິມມະສອນ" },
                12: { org: "MOH", name: "ທ່ານ ກອງໄຊ ລໍວັນເຫືອງ" },
                13: { org: "MOH", name: "ທ່ານ ພອນປະເສີດ ສຸດທະລັກ" },
                14: { org: "MOH", name: "ທ່ານ ສຸພະໄຊ ຄຳພັນທອງ" },
                15: { org: "MOH", name: "ທ່ານ ແດ໋ນ ຈັນທິຈັກ" },
                16: { org: "MOH", name: "ທ່ານ ແສງຈັນ ຫິນປະເສີດ" },
                17: { org: "MOH", name: "ທ່ານ ສັນຍາໄຊ ສິດທິເດດ" },
                18: { org: "MOH", name: "ທ່ານ ດຣ ສິລິສຸກ ສຸກສະຫວັດ" },
                19: { org: "MOH", name: "ທ່ານ ສຸກສະຫວັນ ສີສະໄໝ" },
                20: { org: "MOH", name: "ທ່ານ ນາງ ແກ້ວລານີ ເກດຫົງສາ" },
                21: { org: "MOH", name: "ທ່ານ ນາງ ສຸລີຕ້າ ພິລາວົງ" },
                22: { org: "PSL", name: "ທ່ານ ພອນສະຫັວດ ສຸລິຍາ" },
                23: { org: "PSL", name: "ທ່ານ ທອງເດືອນ ແສງຄໍາ" },
                24: { org: "PSL", name: "ທ່ານ ນາງ ສົມຈັນ ດາລາຈັກ" },
                25: { org: "PSL", name: "ທ່ານ ນາງ ສິອຳໄພ ພົມມະລາດ" },
                26: { org: "PSL", name: "ທ່ານ ໄຊທະນິກບຸນພອນ ໄຊຍະສອນ" },
                27: { org: "PSL", name: "ທ່ານ ແສງມະນີ ແສນອີນຄຳ" },
                28: { org: "PSL", name: "ທ່ານ ບຸນເຊືອງ ສີໄຊພອນ" },
                29: { org: "PSL", name: "ທ່ານ ພັນທະລີ ແກ້ວນາລີ" },
                30: { org: "ODX", name: "ທ່ານ ຊວງ ຮ່ວມສາຍພອນ" },
                31: { org: "ODX", name: "ທ່ານ ນາງ ບຸນຫຼາຍ ທັດສະພອນ" }
            };

            // --- ລະບົບອັບໂຫຼດ CSV ດ້ວຍຕົນເອງ ---
            document.getElementById('csv-upload').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const text = e.target.result;
                    const lines = text.split('\n');
                    let count = 0;
                    
                    lines.forEach(line => {
                        const parts = line.split(',');
                        if (parts.length >= 3) {
                            const num = parseInt(parts[0].trim());
                            if (!isNaN(num)) {
                                participantsData[num] = {
                                    org: parts[1].trim(),
                                    name: parts[2].replace(/\r/g, '').replace(/"/g, '').trim()
                                };
                                count++;
                            }
                        }
                    });
                    
                    const statusText = document.getElementById('upload-status');
                    statusText.textContent = `✅ ໂຫຼດລາຍຊື່ສຳເລັດແລ້ວ ຈຳນວນ: ${count} ທ່ານ!`;
                    statusText.classList.remove('hidden');
                    
                    // ອັບເດດໜ້າຈໍໃໝ່ທັງໝົດ
                    renderSeats();
                    updateUI();
                };
                reader.readAsText(file, 'UTF-8');
            });

            // --- ລະບົບເຕັມຈໍ (Pseudo-Fullscreen Logic) ---
            const fullscreenBtn = document.getElementById('fullscreen-btn');
            const simulatorCard = document.getElementById('simulator-card');
            const fsIcon = document.getElementById('fullscreen-icon');
            const fsText = document.getElementById('fullscreen-text');

            fullscreenBtn.addEventListener('click', () => {
                simulatorCard.classList.toggle('pseudo-fullscreen');
                
                if (simulatorCard.classList.contains('pseudo-fullscreen')) {
                    document.body.style.overflow = 'hidden';
                    fsIcon.textContent = '✖';
                    fsText.textContent = 'ຫຍໍ້ຈໍ';
                    simulatorCard.style.padding = "2rem 10%";
                } else {
                    document.body.style.overflow = '';
                    fsIcon.textContent = '⛶';
                    fsText.textContent = 'ເຕັມຈໍ';
                    simulatorCard.style.padding = "";
                }
            });
            // ------------------------------------

            // ຕັ້ງຄ່າຈຳນວນຄົນ ແລະ ລຳດັບ
            const startNum = 2; // ເລີ່ມຈາກລຳດັບທີ 2
            const endNum = 61;  // ສິ້ນສຸດທີ່ລຳດັບ 61
            const totalPeople = endNum - startNum + 1; // ຄຳນວນຈຳນວນທັງໝົດ (60)
            
            let currentPersonNum = startNum; // ຕົວແປເກັບລຳດັບປະຈຸບັນ
            let isStarted = false;           // ສະຖານະການເລີ່ມຕົ້ນ
            
            const seatsContainer = document.getElementById('seating-area');
            const displayPerson = document.getElementById('current-person-display');
            const btnNext = document.getElementById('btn-next');
            const btnReset = document.getElementById('btn-reset');
            
            let seatElements = [];

            function renderSeats() {
                seatsContainer.innerHTML = '';
                seatElements = [];
                
                let rowCount = 0;
                let currentRowDiv = null;

                for (let i = startNum; i <= endNum; i++) {
                    let index = i - startNum;
                    
                    if (index % 10 === 0) {
                        rowCount++;
                        currentRowDiv = document.createElement('div');
                        currentRowDiv.className = 'seat-grid relative';
                        
                        let rowLabel = document.createElement('div');
                        rowLabel.className = 'absolute -left-12 top-1/2 transform -translate-y-1/2 text-[11px] font-bold text-slate-400 hidden md:block';
                        rowLabel.textContent = `ແຖວ ${rowCount}`;
                        currentRowDiv.appendChild(rowLabel);
                        
                        seatsContainer.appendChild(currentRowDiv);
                    }

                    const seat = document.createElement('div');
                    seat.className = 'seat seat-pending shadow-sm';
                    seat.textContent = i;
                    seat.id = `seat-${i}`;
                    
                    // ເພີ່ມຊື່ເຂົ້າໃນ Tooltip ເວລາເອົາເມົາສ໌ຊີ້
                    const personInfo = participantsData[i];
                    if (personInfo) {
                        seat.title = `ລຳດັບ ${i}: ${personInfo.name} (${personInfo.org})`;
                    } else {
                        seat.title = `ລຳດັບ ${i}`;
                    }
                    
                    // ຄລິກເພື່ອເບິ່ງຊື່
                    seat.addEventListener('click', () => {
                        const name = personInfo ? personInfo.name : 'ຍັງບໍ່ມີຂໍ້ມູນໃນລະບົບ';
                        const org = personInfo ? `\nໜ່ວຍງານ: ${personInfo.org}` : '';
                        alert(`ລຳດັບທີ ${i}:\nຊື່: ${name}${org}\n\n(ຕຳແໜ່ງບ່ອນນັ່ງແຖວທີ ${Math.ceil((i - startNum + 1) / 10)})`);
                    });

                    currentRowDiv.appendChild(seat);
                    seatElements.push(seat);
                }
            }

            // ຟັງຊັນສ້າງຄົນຍ່າງພ້ອມຊື່
            function spawnWalker(personNum) {
                const track = document.getElementById('animation-track');
                const walker = document.createElement('div');
                walker.className = 'absolute animate-walk text-4xl drop-shadow-md flex flex-col items-center justify-center';
                
                // ດຶງຊື່ມາສະແດງເທິງຫົວ
                const pName = participantsData[personNum] ? participantsData[personNum].name : 'ບໍ່ມີຊື່';
                
                walker.innerHTML = `
                    <div class="bg-white text-slate-800 text-[10px] px-2 py-1 rounded shadow text-center whitespace-nowrap mb-1 font-bold border border-slate-200">
                        ${pName}
                    </div>
                    <div class="bg-blue-600 text-white text-[12px] font-bold rounded-full h-7 w-7 flex items-center justify-center mb-1 border-2 border-white shadow-sm">
                        ${personNum}
                    </div>
                    👨‍🎓
                `;
                
                track.appendChild(walker);
                
                setTimeout(() => {
                    if(track.contains(walker)) {
                        walker.remove();
                    }
                }, 3000);
            }

            function updateUI() {
                seatElements.forEach((seat, index) => {
                    const personNum = startNum + index;
                    seat.className = 'seat shadow-sm'; 

                    if (personNum < currentPersonNum) {
                        seat.classList.add('seat-completed');
                    } else if (personNum === currentPersonNum && isStarted) {
                        seat.classList.add('seat-active');
                    } else if (
                        (isStarted && personNum > currentPersonNum && personNum <= currentPersonNum + 9) ||
                        (!isStarted && personNum >= startNum && personNum <= startNum + 9)
                    ) {
                        seat.classList.add('seat-standby');
                    } else {
                        seat.classList.add('seat-pending');
                    }
                });

                if (!isStarted) {
                    displayPerson.innerHTML = `<span class="inline-block bg-blue-100 text-blue-800 px-5 py-2.5 rounded-full font-bold text-lg shadow-sm border border-blue-200">ລໍຖ້າເລີ່ມພິທີ (ເລີ່ມຈາກໝາຍເລກ ${startNum})...</span>`;
                } else if (currentPersonNum <= endNum) {
                    // ດຶງຊື່ມາສະແດງກາງເວທີ
                    const pName = participantsData[currentPersonNum] ? participantsData[currentPersonNum].name : 'ບໍ່ມີຂໍ້ມູນໃນລະບົບ';
                    const pOrg = participantsData[currentPersonNum] ? `(${participantsData[currentPersonNum].org})` : '';

                    displayPerson.innerHTML = `
                        <span class="inline-block bg-blue-600 text-white px-8 py-2.5 rounded-full font-bold text-xl shadow-lg">
                            ກຳລັງມອບໃຫ້: ລຳດັບທີ ${currentPersonNum}
                        </span>
                        <div class="text-base sm:text-lg mt-3 font-bold text-slate-800">
                            ${pName} <span class="text-slate-500 text-sm font-normal">${pOrg}</span>
                        </div>
                        <div class="text-[11px] sm:text-xs mt-1 font-semibold text-slate-500">
                            (ແຖວທີ ${Math.ceil((currentPersonNum - startNum + 1) / 10)} ກຳລັງ Standby)
                        </div>
                    `;
                } else {
                    displayPerson.innerHTML = `<span class="inline-block bg-emerald-100 text-emerald-800 px-8 py-2.5 rounded-full font-bold text-xl shadow-sm border border-emerald-300">🎉 ສຳເລັດພິທີການທັງໝົດ ${totalPeople} ທ່ານ!</span>`;
                    btnNext.disabled = true;
                    btnNext.classList.add('opacity-50', 'cursor-not-allowed');
                }
            }

            btnNext.addEventListener('click', () => {
                if (!isStarted) {
                    isStarted = true;
                    spawnWalker(currentPersonNum);
                    updateUI();
                } else {
                    if (currentPersonNum < endNum) {
                        currentPersonNum++;
                        spawnWalker(currentPersonNum); 
                        updateUI();
                    } else if (currentPersonNum === endNum) {
                        currentPersonNum++;
                        updateUI();
                    }
                }
            });

            btnReset.addEventListener('click', () => {
                currentPersonNum = startNum;
                isStarted = false;
                btnNext.disabled = false;
                btnNext.classList.remove('opacity-50', 'cursor-not-allowed');
                
                document.getElementById('animation-track').innerHTML = '';
                
                updateUI();
            });

            // ເອີ້ນໃຊ້ຕອນເລີ່ມຕົ້ນ
            renderSeats();
            updateUI(); 
        });
    </script>
</body>
</html>
